<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teamspeak Einladung</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0d162a 0%, #1d2d4e 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 30px;
      border-radius: 14px;
      width: 320px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }
    h1 { margin: 0 0 16px; font-size: 1.7rem; }
    p { margin: 0 0 20px; line-height: 1.4; }
    .invite-btn {
      display: inline-block;
      padding: 12px 22px;
      border-radius: 8px;
      background: #54a7ff;
      border: 0;
      color: white;
      font-size: 1rem;
      text-decoration: none;
      transition: transform .16s ease, box-shadow .16s ease;
    }
    .invite-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.35);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Teamspeak Einladung</h1>
    <p>Klicke auf den Button, um dem Teamspeak-Server beizutreten:</p>

    <!-- Ersetze die URL hier mit deinem echten Einladungslink -->
    <a href="ts3server://ts.goesse.me?port=9987" id="inviteBtn" class="invite-btn">
      Teamspeak beitreten
    </a>

    <p id="statusText" style="margin-top: 16px; font-size: 0.9rem; color: #d9e6ff;">
      Bitte warten…
    </p>
  </div>

  <script>
    const teamspeakUri = 'ts3server://ts.goesse.me?port=9987';

    document.getElementById('inviteBtn').addEventListener('click', function(e) {
      e.preventDefault();
      const statusText = document.getElementById('statusText');
      statusText.innerText = 'Versuche Teamspeak zu öffnen...';

      // Versuche das Protokoll zu öffnen
      const iframe = document.createElement('iframe');
      iframe.style.display = 'none';
      document.body.appendChild(iframe);
      iframe.src = teamspeakUri;

      // Nach 3 Sekunden prüfen, ob es funktioniert hat
      setTimeout(() => {
        document.body.removeChild(iframe);
        // Wenn wir hier sind, hat es wahrscheinlich nicht funktioniert
        statusText.innerHTML = 'Das Protokoll wird nicht unterstützt. Versuche ein anderes Geräte oder öffne den Link manuell in deinem Teamspeak-Client.';
      }, 3000);
    });
  </script>
</body>
</html>
